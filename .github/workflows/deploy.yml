name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  # ---------------------------------------------------------------------------
  # Deploy para STAGING
  # ---------------------------------------------------------------------------
  deploy-staging:
    if: github.ref == 'refs/heads/main' || inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.DEPLOY_URL || 'https://staging.nexus-ai.vercel.app' }}
    env:
      NODE_ENV: staging
      PORT: ${{ secrets.PORT }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @nexus-ai/api db:generate

      - name: Run migrations (Staging)
        run: pnpm --filter @nexus-ai/api db:migrate:deploy

      - name: Build API
        run: pnpm --filter @nexus-ai/api build

      - name: Build Web
        run: pnpm --filter @nexus-ai/web build

      # Aqui voce adicionaria o step real de deploy (Render, Railway, VPS, etc.)
      - name: Deploy to Staging (placeholder)
        run: |
          echo "Deploying to STAGING..."
          echo "DATABASE_URL=${DATABASE_URL//$(echo $DATABASE_URL | sed 's/.*:\/\/[^:]*:\([^@]*\)@.*/\1')/****}"
          echo "REDIS_URL=${REDIS_URL//$(echo $REDIS_URL | sed 's/.*:\/\/[^:]*:\([^@]*\)@.*/\1')/****}"
          echo "CORS_ORIGIN=$CORS_ORIGIN"

  # ---------------------------------------------------------------------------
  # Deploy para PRODUCTION (requer aprovacao manual se configurado no environment)
  # ---------------------------------------------------------------------------
  deploy-production:
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: ${{ vars.DEPLOY_URL || 'https://nexus-ai.vercel.app' }}
    env:
      NODE_ENV: production
      PORT: ${{ secrets.PORT }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @nexus-ai/api db:generate

      - name: Run migrations (Production)
        run: pnpm --filter @nexus-ai/api db:migrate:deploy

      - name: Build API
        run: pnpm --filter @nexus-ai/api build

      - name: Build Web
        run: pnpm --filter @nexus-ai/web build

      # Aqui voce adicionaria o step real de deploy (Render, Railway, VPS, etc.)
      - name: Deploy to Production (placeholder)
        run: |
          echo "Deploying to PRODUCTION..."
          echo "CORS_ORIGIN=$CORS_ORIGIN"
          echo "OLLAMA_BASE_URL=$OLLAMA_BASE_URL"
