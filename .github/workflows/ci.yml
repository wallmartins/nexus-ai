name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Usa o environment 'staging' para acessar secrets organizados por ambiente
    environment: staging

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://nexus:nexus@localhost:5432/nexus_ai' }}
      REDIS_URL: ${{ secrets.REDIS_URL || 'redis://localhost:6379' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @nexus-ai/api db:generate

      - name: Build packages and apps
        run: pnpm build

      - name: Type check
        run: pnpm type-check
